services:
  - type: web
    name: request-bot
    runtime: python

    buildCommand: pip install -r requirements.txt

    startCommand: python bot.py

    envVars:
      - key: BOT_TOKEN
        sync: false

      - key: MONGO_URI
        sync: false

      - key: OWNER_ID
        sync: false

      - key: WEBHOOK_URL
        sync: false
